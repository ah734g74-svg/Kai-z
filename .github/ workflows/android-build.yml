name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21' # تم التحديث إلى 21 لتطابق إعدادات المشروع
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # المهمة الصحيحة بناءً على هيكلة مشروعك
      run: ./gradlew :androidApp:assembleFossDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kai-Ezz-APK
        # المسار الصحيح لملف الـ APK الناتج
        path: androidApp/build/outputs/apk/foss/debug/androidApp-foss-debug.apk
